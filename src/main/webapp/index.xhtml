<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="jakarta.faces.core">

<h:head>
    <title>Sistema de Gestão - Home</title>
    <style>
        body {
            background-color: #f4f7f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        .dashboard-container {
            text-align: center;
        }

        .modules-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 40px;
        }

        .module-card {
            width: 300px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none !important;
        }

        .module-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1) !important;
        }

        .icon-container {
            font-size: 4rem;
            color: #3f51b5;
            margin-bottom: 20px;
        }

        .module-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
        }

        .module-desc {
            color: #666;
            margin-top: 10px;
        }
    </style>
</h:head>

<h:body>
    <div class="dashboard-container">
        <h:form>
            <h1 style="color: #2c3e50; font-size: 2.5rem;">Bem-vindo ao Sistema De Gestão De Tarefas</h1>
            <p style="color: #7f8c8d;">Selecione um módulo para começar</p>

            <div class="modules-grid">
                
                <h:commandLink action="responsible.xhtml?faces-redirect=true" styleClass="module-card">
                    <p:card>
                        <div class="icon-container">
                            <i class="pi pi-users"></i>
                        </div>
                        <div class="module-title">Responsáveis</div>
                        <p class="module-desc">Cadastre e gerencie os membros da equipe que executarão as tarefas.</p>
                    </p:card>
                </h:commandLink>

                <h:commandLink action="task.xhtml?faces-redirect=true" styleClass="module-card">
                    <p:card>
                        <div class="icon-container" style="color: #4caf50;">
                            <i class="pi pi-list"></i>
                        </div>
                        <div class="module-title">Tarefas</div>
                        <p class="module-desc">Visualize, crie e controle o status e a prioridade das atividades.</p>
                    </p:card>
                </h:commandLink>

            </div>
        </h:form>
    </div>
</h:body>
</html>
